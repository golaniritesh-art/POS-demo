name: POS CI/CD

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check NativeScript app
        run: npx tsc --noEmit

      - name: Restore C# Appium regression project
        run: dotnet restore tests/AppiumRegression/AppiumRegression.csproj

      - name: Build C# Appium regression project
        run: dotnet build tests/AppiumRegression/AppiumRegression.csproj --configuration Release --no-restore

  android-debug-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Build Android debug APK
        run: npx ns build android

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: retail-pos-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
